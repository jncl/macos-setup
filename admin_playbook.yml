---
- hosts: all

  vars_files:
    - admin_setup.yml
    - osx-defaults.yml

  roles:
    - role: geerlingguy.homebrew
      when: homebrew_cask_apps
      tags: homebrew
    - role: geerlingguy.mas
      when: mas_installed_apps
      tags: mas
    - adminconfig

  tasks:
    - install-other-casks.yml
    - modify-dock.yml
    - set-defaults.yml
    