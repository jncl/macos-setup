osx_global_defaults:
  - { domain: NSGlobalDomain, key: NSNavPanelExpandedStateForSaveMode, type: bool, value: true, state: present }
  - { domain: NSGlobalDomain, key: PMPrintingExpandedStateForPrint, type: bool, value: true } # Expand print panel
  - { domain: NSGlobalDomain, key: NSDocumentSaveNewDocumentsToCloud, type: bool, value: false } # Save to disk (not to iCloud)
  - { domain: NSGlobalDomain, key: AppleMeasurementUnits, type: string, value: Inches, state: present } # Set Measurements to Imperial
  - { domain: NSGlobalDomain, key: com.apple.swipescrolldirection, type: bool, value: false } # Disable natural scrolling
  - { domain: NSGlobalDomain, key: AppleShowScrollBars, type: string, value: "WhenScrolling" } # Show scrollbars only when scrolling
  - { domain: NSGlobalDomain, key: NSAutomaticWindowAnimationsEnabled, type: bool, value: false } # Opening and closing windows and popovers
  - { domain: NSGlobalDomain, key: AppleKeyboardUIMode, type: int, value: true } # Enable full keyboard access for all controls (e.g. enable Tab in modal dialogs)
  - { domain: /Library/Preferences/com.apple.SoftwareUpdate, key: AutomaticCheckEnabled, type: int, value: 1 } #  Enable Automatic check for Software Updates

osx_local_defaults:
  - { domain: com.apple.dock, key: launchanim, type: bool, value: true } # Don’t animate opening applications from the Dock
  - { domain: com.apple.dock, key: autohide, type: bool, value: true } # Autohide the Dock
  - { domain: com.apple.dock, key: autohide-delay, type: float, value: 0 } # Remove autohide delay
  - { domain: com.apple.dock, key: tilesize, type: int, value: 50 } # Set dock tile size
  - { domain: com.apple.dock, key: largesize, type: int, value: 85 } # Set dock tile large size
  - { domain: com.apple.finder, key: FXEnableExtensionChangeWarning, type: bool, value: false } # Disable the warning when changing a file extension
  - { domain: com.apple.finder, key: FXPreferredViewStyle, type: string, value: "clmv" } # Use column view in all Finder windows by default, other view modes: `icnv`, `Nlsv`, `Flwv
  - { domain: com.apple.finder, key: WarnOnEmptyTrash, type: bool, value: false } # Disable the warning before emptying the Trash
  - { domain: com.apple.finder, key: EmptyTrashSecurely, type: bool, value: true } # Empty trash securely
  - { domain: com.apple.finder, key: QLEnableTextSelection, type: bool, value: true } # Allow text selection in the Quick Look window
  - { domain: com.apple.dashboard, key: db-enabled-state, type: int, value: 1 } # Set dashboard state disabled
  - { domain: com.apple.dashboard, key: mcx-disabled, type: bool, value: true } # Disable dashboard
  - { domain: com.apple.screensaver, host: currentHost, key: showClock, type: int, value: 1 } # Set Screensaver to Clock
