---
  
- name: Configure UI
  block:
  # become: yes
    - name: Modify the Dock
      ansible.builtin.include_tasks: modify-dock.yml
      tags: dock

- name: Set User defaults
  community.general.osx_defaults:
    domain: "{{ item.domain | default(omit) }}"
    host: "{{ item.host | default(omit) }}"
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    state: present
  loop: "{{ osx_user_defaults }}"


