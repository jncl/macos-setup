---

dockitems_to_remove:
  - Launchpad
  - Maps
  - Photos
  - Reminders
  - Notes
  - TV
  - Podcasts
  - News
  - Downloads

dockitems_to_persist:
  - name: Screen Sharing
    path: "/System/Library/CoreServices/Applications/Screen Sharing.app"
    pos: 10
  - name: TextMate
    path: "/Applications/TextMate.app"
    pos: 11

osx_user_defaults:
  - { domain: com.apple.controlcenter, host: currentHost, key: "NSStatusItem Visible UserSwitcher", type: bool, value: true } # Show FUS on MenuBar
  - { domain: com.apple.controlcenter, host: currentHost, key: "NSStatusItem Visible ScreenMirroring", type: bool, value: false } # Don't Show Screen Mirroring on MenuBar
  - { domain: com.apple.controlcenter, host: currentHost, key: "NSStatusItem Visible WiFi", type: bool, value: false } # Don't Show WiFi on MenuBar
  - { domain: com.apple.mail, key: PreferPlainText, type: bool, value: true } # Force all Mail messages to display as plain text
  - { domain: com.apple.mail, key: SuppressAddressHistory, type: bool, value: true } # Disable tracking of Previous Recipients
  - { domain: com.apple.mail, key: SendWindowsFriendlyAttachments, type: bool, value: true } # Send Windows friendly attachments
  - { domain: com.apple.safari, key: IncludeInternalDebugMenu, type: bool, value: true } # Add Debug Menu to Safari
  - { domain: com.apple.screencapture, key: location, type: string, value: "$HOME/Desktop" } # Save screenshots to the desktop
  - { domain: com.apple.screencapture, key: type, type: string, value: "png" } # Save screenshots in PNG format (other options: BMP, GIF, JPG, PDF, TIFF)
  - { domain: com.apple.screensaver, host: currentHost, key: showClock, type: int, value: 1 } # Set Screensaver to Clock
  - { domain: com.googlecode.iterm2, key: PromptOnQuit, type: bool, value: false } # Don’t display the annoying prompt when quitting iTerm
